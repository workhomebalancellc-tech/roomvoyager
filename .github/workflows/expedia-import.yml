name: Expedia Daily Import

on:
  schedule:
    # Runs every day at 8:00 AM UTC (4 AM ET / 1 AM PT)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Expedia import
        env:
          EXPEDIA_EMAIL:          ${{ secrets.EXPEDIA_EMAIL }}
          EXPEDIA_PASSWORD:       ${{ secrets.EXPEDIA_PASSWORD }}
          IMPORT_API_URL:         ${{ secrets.IMPORT_API_URL }}
          EXPEDIA_IMPORT_SECRET:  ${{ secrets.EXPEDIA_IMPORT_SECRET }}
        run: node scripts/expedia-import.js

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: tmp-downloads/
          if-no-files-found: ignore
