<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; }
  </style>
</head>
<body>

  <div
    class="eg-widget"
    data-widget="search"
    data-program="us-expedia"
    data-lobs="stays"
    data-network="pz"
    data-camref="1110l8R3Z"
    data-pubref="">
  </div>

  <!-- Tell parent iframe how tall we are once widget renders -->
  <script>
    var checks = 0;
    var timer = setInterval(function () {
      var h = document.body.scrollHeight;
      if (h > 20 || ++checks > 30) {
        window.parent.postMessage({ egWidgetHeight: h }, '*');
        clearInterval(timer);
      }
    }, 100);
  </script>

  <!-- Expedia widget script MUST come after the div -->
  <script
    class="eg-widgets-script"
    src="https://creator.expediagroup.com/products/widgets/assets/eg-widgets.js">
  </script>

</body>
</html>
