<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #ffffff; overflow: hidden; }
  </style>
</head>
<body>

  <div
    class="eg-widget"
    data-widget="search"
    data-program="us-expedia"
    data-lobs="stays"
    data-network="pz"
    data-camref="1110l8R3Z"
    data-pubref="">
  </div>

  <!-- Auto-resize: measure the widget element itself, not body -->
  <script>
    var checks = 0;
    var timer = setInterval(function () {
      var el = document.querySelector('.eg-widget');
      var h = el ? el.getBoundingClientRect().height : 0;
      if (h > 150) {
        window.parent.postMessage({ egWidgetHeight: h - 2 }, '*');
        clearInterval(timer);
      } else if (++checks > 60) {
        window.parent.postMessage({ egWidgetHeight: 240 }, '*');
        clearInterval(timer);
      }
    }, 100);
  </script>

  <!-- Capture widget keystrokes and send to parent page -->
  <script>
    (function () {
      var captured = {};

      function send(key, val) {
        if (!key || val === undefined) return;
        captured[key] = val;
        window.parent.postMessage({ rvWidgetInput: Object.assign({}, captured) }, '*');
      }

      function attach(el) {
        if (el.dataset.rvTracked) return;
        el.dataset.rvTracked = '1';
        var key = el.name || el.getAttribute('aria-label') || el.placeholder || el.id || el.type;
        el.addEventListener('input',  function () { send(key, el.value); });
        el.addEventListener('change', function () { send(key, el.value); });
      }

      function scan() {
        document.querySelectorAll('input, select, textarea').forEach(attach);
      }

      new MutationObserver(scan).observe(document.body, { childList: true, subtree: true });
      scan();
    })();
  </script>

  <!-- Expedia widget script MUST come after the div -->
  <script
    class="eg-widgets-script"
    src="https://creator.expediagroup.com/products/widgets/assets/eg-widgets.js">
  </script>

</body>
</html>
