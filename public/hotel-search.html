<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #ffffff; overflow: hidden; }
  </style>
</head>
<body>

  <div
    class="eg-widget"
    data-widget="search"
    data-program="us-expedia"
    data-lobs="stays"
    data-network="pz"
    data-camref="1110l8R3Z"
    data-pubref="">
  </div>

  <!-- Set pubref from URL param before widget initializes -->
  <script>
    (function () {
      var pubref = new URLSearchParams(window.location.search).get('pubref') || '';
      if (pubref) {
        var w = document.querySelector('.eg-widget');
        if (w) w.setAttribute('data-pubref', pubref);
      }
    })();
  </script>

  <!-- Auto-resize: measure the widget element itself, not body -->
  <script>
    var checks = 0;
    var timer = setInterval(function () {
      var el = document.querySelector('.eg-widget');
      var h = el ? el.getBoundingClientRect().height : 0;
      if (h > 150) {
        window.parent.postMessage({ egWidgetHeight: h - 2 }, '*');
        clearInterval(timer);
      } else if (++checks > 60) {
        window.parent.postMessage({ egWidgetHeight: 240 }, '*');
        clearInterval(timer);
      }
    }, 100);
  </script>


<!-- Expedia widget script MUST come after the div -->
  <script
    class="eg-widgets-script"
    src="https://creator.expediagroup.com/products/widgets/assets/eg-widgets.js">
  </script>

</body>
</html>
